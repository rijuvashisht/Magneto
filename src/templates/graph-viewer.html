<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magneto AI — Knowledge Graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
  #header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; }
  #header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }
  #header .stats { font-size: 13px; color: #8b949e; }
  #search-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; color: #c9d1d9; font-size: 13px; width: 260px; }
  #search-box:focus { outline: none; border-color: #58a6ff; }
  #filter-bar { padding: 8px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: #21262d; border: 1px solid #30363d; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #8b949e; cursor: pointer; }
  .filter-btn.active { background: #1f6feb33; border-color: #58a6ff; color: #58a6ff; }
  .filter-btn:hover { border-color: #58a6ff; }
  #graph-container { width: 100%; height: calc(100vh - 100px); }
  #tooltip { position: absolute; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; font-size: 13px; max-width: 320px; pointer-events: none; display: none; z-index: 100; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
  #tooltip h3 { color: #58a6ff; margin-bottom: 6px; font-size: 14px; }
  #tooltip .prop { color: #8b949e; margin: 2px 0; }
  #tooltip .prop strong { color: #c9d1d9; }
</style>
</head>
<body>
<div id="header">
  <h1>⚡ Magneto AI — Knowledge Graph</h1>
  <input id="search-box" type="text" placeholder="Search nodes..." />
  <span class="stats" id="stats"></span>
</div>
<div id="filter-bar" id="filters"></div>
<div id="graph-container"></div>
<div id="tooltip"></div>

<script>
// ── Graph data injected by Magneto ──────────────────────────────────────────
const GRAPH_DATA = __GRAPH_JSON__;

// ── Color palette per community ─────────────────────────────────────────────
const PALETTE = [
  '#58a6ff','#f78166','#7ee787','#d2a8ff','#ffa657',
  '#ff7b72','#79c0ff','#a5d6ff','#ffd866','#ff9bce',
  '#b392f0','#56d4dd','#dbedff','#fddf68','#ffab70',
];

const TYPE_SHAPES = {
  file: 'dot', module: 'diamond', class: 'triangle',
  function: 'square', interface: 'triangleDown', type: 'star',
  export: 'dot', package: 'hexagon',
};

// ── Build vis.js datasets ───────────────────────────────────────────────────
const visNodes = GRAPH_DATA.nodes.map(n => ({
  id: n.id,
  label: n.label,
  title: `${n.type}: ${n.label}`,
  shape: TYPE_SHAPES[n.type] || 'dot',
  color: {
    background: PALETTE[(n.community || 0) % PALETTE.length],
    border: n.isGodNode ? '#ffd866' : PALETTE[(n.community || 0) % PALETTE.length],
    highlight: { background: '#ffd866', border: '#ffd866' },
  },
  size: Math.max(8, Math.min(40, (n.degree || 1) * 2)),
  borderWidth: n.isGodNode ? 3 : 1,
  font: { color: '#c9d1d9', size: n.isGodNode ? 14 : 11 },
  _data: n,
}));

const visEdges = GRAPH_DATA.edges.map((e, i) => ({
  id: 'e' + i,
  from: e.source,
  to: e.target,
  label: e.relation,
  arrows: 'to',
  color: { color: e.tag === 'EXTRACTED' ? '#30363d' : '#21262d', opacity: 0.6 },
  font: { color: '#484f58', size: 9, strokeWidth: 0 },
  smooth: { type: 'continuous' },
  width: e.confidence,
  _data: e,
}));

// ── Stats ───────────────────────────────────────────────────────────────────
document.getElementById('stats').textContent =
  `${GRAPH_DATA.metadata.totalNodes} nodes · ${GRAPH_DATA.metadata.totalEdges} edges · ${GRAPH_DATA.metadata.totalCommunities} communities`;

// ── Type filters ────────────────────────────────────────────────────────────
const types = [...new Set(GRAPH_DATA.nodes.map(n => n.type))];
const filterBar = document.getElementById('filter-bar');
const activeTypes = new Set(types);

types.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn active';
  btn.textContent = t;
  btn.onclick = () => {
    if (activeTypes.has(t)) { activeTypes.delete(t); btn.classList.remove('active'); }
    else { activeTypes.add(t); btn.classList.add('active'); }
    applyFilters();
  };
  filterBar.appendChild(btn);
});

// ── Network ─────────────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const data = { nodes: new vis.DataSet(visNodes), edges: new vis.DataSet(visEdges) };
const options = {
  physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -40, springLength: 100 }, stabilization: { iterations: 150 } },
  interaction: { hover: true, tooltipDelay: 100, navigationButtons: false, keyboard: true },
  edges: { font: { align: 'middle' } },
};
const network = new vis.Network(container, data, options);

// ── Tooltip ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
network.on('hoverNode', (e) => {
  const node = GRAPH_DATA.nodes.find(n => n.id === e.node);
  if (!node) return;
  let html = `<h3>${node.label}</h3>`;
  html += `<div class="prop"><strong>Type:</strong> ${node.type}</div>`;
  if (node.file) html += `<div class="prop"><strong>File:</strong> ${node.file}</div>`;
  if (node.module) html += `<div class="prop"><strong>Module:</strong> ${node.module}</div>`;
  html += `<div class="prop"><strong>Community:</strong> ${node.community}</div>`;
  html += `<div class="prop"><strong>Degree:</strong> ${node.degree}</div>`;
  if (node.isGodNode) html += `<div class="prop" style="color:#ffd866"><strong>★ God Node</strong></div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  const pos = e.event.center || e.event;
  tooltip.style.left = (pos.x || e.event.clientX) + 12 + 'px';
  tooltip.style.top = (pos.y || e.event.clientY) + 12 + 'px';
});
network.on('blurNode', () => { tooltip.style.display = 'none'; });

// ── Search ──────────────────────────────────────────────────────────────────
document.getElementById('search-box').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  if (!q) { data.nodes.update(visNodes.map(n => ({ id: n.id, hidden: false }))); return; }
  const matching = new Set();
  GRAPH_DATA.nodes.forEach(n => { if (n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q)) matching.add(n.id); });
  data.nodes.update(visNodes.map(n => ({ id: n.id, hidden: !matching.has(n.id) })));
});

// ── Filter ──────────────────────────────────────────────────────────────────
function applyFilters() {
  const visible = new Set();
  GRAPH_DATA.nodes.forEach(n => { if (activeTypes.has(n.type)) visible.add(n.id); });
  data.nodes.update(visNodes.map(n => ({ id: n.id, hidden: !visible.has(n.id) })));
}
</script>
</body>
</html>
