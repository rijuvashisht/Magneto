  file: 'dot', module: 'diamond', class: 'triangle',
  function: 'square', interface: 'triangleDown', type: 'star',
  export: 'dot', package: 'hexagon',
};

// ── Build vis.js datasets ───────────────────────────────────────────────────
const visNodes = GRAPH_DATA.nodes.map(n => ({

  shape: TYPE_SHAPES[n.type] || 'dot',
  color: {

  to: e.target,
  label: e.relation,
  arrows: 'to',
  color: { color: e.tag === 'EXTRACTED' ? '#30363d' : '#21262d', opacity: 0.6 },

const activeTypes = new Set(types);

types.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn active';
  btn.textContent = t;
  btn.onclick = () => {
    if (activeTypes.has(t)) { activeTypes.delete(t); btn.classList.remove('active'); }

});

  if (!node) return;
  let html = `<h3>${node.label}</h3>`;
  html += `<div class="prop"><strong>Type:</strong> ${node.type}</div>`;
  if (node.file) html += `<div class="prop"><strong>File:</strong> ${node.file}</div>`;
  if (node.module) html += `<div class="prop"><strong>Module:</strong> ${node.module}</div>`;
  html += `<div class="prop"><strong>Community:</strong> ${node.community}</div>`;
  html += `<div class="prop"><strong>Degree:</strong> ${node.degree}</div>`;

  const pos = e.event.center || e.event;

});

// ── Search ──────────────────────────────────────────────────────────────────
document.getElementById('search-box').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  if (!q) { data.nodes.update(visNodes.map(n => ({ id: n.id, hidden: false }))); return; }
  const matching = new Set();
  GRAPH_DATA.nodes.forEach(n => { if (n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q)) matching.add(n.id); });
  data.nodes.update(visNodes.map(n => ({ id: n.id, hidden: !matching.has(n.id) })));
});

function applyFilters() {
  const visible = new Set();
  GRAPH_DATA.nodes.forEach(n => { if (activeTypes.has(n.type)) visible.add(n.id); });
