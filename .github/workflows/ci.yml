name: CI

on:
  push:
    branches: [main, develop]
    tags-ignore: ['v*']  # manual tags handled by release.yml
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        if: matrix.node-version == 20
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  auto-release:
    name: Auto Release
    needs: build-and-test
    runs-on: ubuntu-latest
    # Run on: (1) direct push to main, or (2) PR merged to main
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine version bump from commits
        id: bump
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -1)
          echo "Last tag: $LAST_TAG"

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"%s")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --pretty=format:"%s")
          fi

          echo "Commits since last tag:"
          echo "$COMMITS"

          if [ -z "$COMMITS" ]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "No new commits since last tag — skipping release"
            exit 0
          fi

          # Determine bump type from conventional commits
          if echo "$COMMITS" | grep -qiE '(BREAKING CHANGE|^.+!:)'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          # Extract breaking changes for release notes
          BREAKING_CHANGES=""
          if echo "$COMMITS" | grep -qiE 'BREAKING CHANGE'; then
            BREAKING_CHANGES=$(echo "$COMMITS" | grep -iE 'BREAKING CHANGE' | sed 's/^/- ⚠️ /')
          fi

          echo "BUMP=$BUMP" >> $GITHUB_OUTPUT
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "BREAKING_CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$BREAKING_CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "SKIP=false" >> $GITHUB_OUTPUT
          echo "Version bump: $BUMP"

      - name: Bump version
        if: steps.bump.outputs.SKIP != 'true'
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.bump.outputs.BUMP }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to: $NEW_VERSION"

      - name: Commit version bump and create tag
        if: steps.bump.outputs.SKIP != 'true'
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.VERSION }} [skip ci]"
          # Delete tag if it exists (idempotent release)
          git tag -d "v${{ steps.version.outputs.VERSION }}" 2>/dev/null || true
          git push origin ":refs/tags/v${{ steps.version.outputs.VERSION }}" 2>/dev/null || true
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin main --tags

      - name: Publish to npm
        if: steps.bump.outputs.SKIP != 'true'
        run: npm run build && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.bump.outputs.SKIP != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.VERSION }}';
            const prevTag = '${{ steps.bump.outputs.LAST_TAG }}';
            const commits = `${{ steps.bump.outputs.COMMITS }}`;
            const bump = '${{ steps.bump.outputs.BUMP }}';

            const compareUrl = prevTag
              ? `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${prevTag}...v${version}`
              : '';

            const bumpBadge = bump === 'major' ? '🚨 Major' : bump === 'minor' ? '✨ Minor' : '🔧 Patch';
            const breakingChanges = `${{ steps.bump.outputs.BREAKING_CHANGES }}`;

            const bodyParts = [
              `## magneto-ai v${version} — ${bumpBadge}`,
              '',
              '### Install',
              '```bash',
              `npm install -g magneto-ai@${version}`,
              '```',
            ];

            // Add breaking changes section if present
            if (breakingChanges && breakingChanges.trim()) {
              bodyParts.push(
                '',
                '### ⚠️ Breaking Changes',
                '**This release contains breaking changes. Please review before upgrading.**',
                '',
                breakingChanges,
                '',
                '**Migration Guide:** See [BREAKING_CHANGES.md](https://github.com/rijuvashisht/Magneto/blob/main/BREAKING_CHANGES.md) for detailed migration instructions.',
                '',
                '**Quick Migration:**',
                '```bash',
                '# Backup your project',
                'cp -r .magneto .magneto.backup',
                '',
                '# Update to new version',
                'npm install -g magneto-ai@' + version,
                '',
                '# Run diagnostics',
                'magneto doctor',
                'magneto adapter doctor',
                '',
                '# Validate all tasks',
                'find .magneto/tasks -name "*.md" -exec magneto task validate {} \\;',
                '```'
              );
            }

            bodyParts.push(
              '',
              '### Changes',
              commits.split('\n').map(l => `- ${l}`).join('\n'),
              '',
              compareUrl ? `**Full diff:** ${compareUrl}` : '',
              '',
              '---',
              '',
              '📖 **Documentation:** https://github.com/rijuvashisht/Magneto#readme',
              '📋 **Changelog:** https://github.com/rijuvashisht/Magneto/blob/main/CHANGELOG.md',
              '⚠️ **Breaking Changes:** https://github.com/rijuvashisht/Magneto/blob/main/BREAKING_CHANGES.md'
            );

            const body = bodyParts.filter(Boolean).join('\n');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `magneto-ai v${version}`,
              body,
              draft: false,
              prerelease: false,
            });

            core.info(`✓ Released v${version}`);
