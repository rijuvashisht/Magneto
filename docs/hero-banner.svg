<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="helmetGradBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c41e3a"/>
      <stop offset="50%" style="stop-color:#8b0000"/>
      <stop offset="100%" style="stop-color:#4a0000"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#c41e3a"/>
    </linearGradient>
    <filter id="glowBanner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Left side: Large Logo -->
  <g transform="translate(200, 300)">
    <!-- Helmet circle -->
    <circle cx="0" cy="0" r="140" fill="url(#helmetGradBanner)"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#e8e8e8" stroke-width="8"/>
    
    <!-- Inner helmet -->
    <circle cx="0" cy="0" r="110" fill="#0d1117"/>
    
    <!-- Helmet brow -->
    <path d="M -80 -50 Q 0 -90 80 -50 L 70 -30 Q 0 -65 -70 -30 Z" fill="#e8e8e8"/>
    
    <!-- The M -->
    <text x="0" y="15" 
          text-anchor="middle" 
          dominant-baseline="middle"
          font-family="Arial Black, sans-serif"
          font-weight="900"
          font-size="140"
          fill="#58a6ff"
          filter="url(#glowBanner)">
      M
    </text>
    
    <!-- Side accents -->
    <ellipse cx="-110" cy="0" rx="15" ry="35" fill="#e8e8e8"/>
    <ellipse cx="110" cy="0" rx="15" ry="35" fill="#e8e8e8"/>
  </g>
  
  <!-- Right side: Text -->
  <g transform="translate(450, 220)">
    <!-- Title -->
    <text x="0" y="0"
          font-family="Arial Black, sans-serif"
          font-weight="900"
          font-size="72"
          fill="#ffffff">
      Magneto AI
    </text>
    
    <!-- Tagline -->
    <text x="0" y="50"
          font-family="Arial, sans-serif"
          font-weight="400"
          font-size="24"
          fill="#8b949e">
      Repo-local AI reasoning framework & agent control plane
    </text>
    
    <!-- Features list -->
    <g transform="translate(0, 100)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" fill="#58a6ff">⚡</text>
      <text x="30" y="0" font-family="Arial, sans-serif" font-size="18" fill="#c9d1d9">Multi-Agent Orchestration</text>
      
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="18" fill="#58a6ff">🛡️</text>
      <text x="30" y="35" font-family="Arial, sans-serif" font-size="18" fill="#c9d1d9">Enterprise Security Guardrails</text>
      
      <text x="0" y="70" font-family="Arial, sans-serif" font-size="18" fill="#58a6ff">🔮</text>
      <text x="30" y="70" font-family="Arial, sans-serif" font-size="18" fill="#c9d1d9">Telepathy Auto-Handoff</text>
      
      <text x="0" y="105" font-family="Arial, sans-serif" font-size="18" fill="#58a6ff">📚</text>
      <text x="30" y="105" font-family="Arial, sans-serif" font-size="18" fill="#c9d1d9">Documentation at magnetoai.vercel.app</text>
    </g>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="100" y="520" width="1000" height="3" fill="url(#accentGrad)"/>
  
  <!-- Corner decorations -->
  <path d="M 50 550 L 50 580 L 80 580" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <path d="M 1150 550 L 1150 580 L 1120 580" fill="none" stroke="#c41e3a" stroke-width="2"/>
</svg>
